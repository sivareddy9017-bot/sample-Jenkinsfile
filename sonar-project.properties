sonar.projectKey=nandyala-siva-sample-jenkinsfile
sonar.projectName=nandyala-siva-sample-jenkinsfile
sonar.projectVersion=1.0

sonar.sources=.
sonar.exclusions=node_modules/**,Jenkinsfile,coverage/**,test/**,.git/**,db/**,helm/**, Dockerfile

sonar.tests=test
sonar.test.inclusions=test/**/*.test.js

# Coverage report generated by Jest (lcov format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test results in JUnit XML format generated by jest-junit
sonar.junit.reportPaths=junit.xml